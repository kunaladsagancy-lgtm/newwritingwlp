<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join WhatsApp Channel - Work From Home</title>
    
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', 'YOUR_PIXEL_ID_HERE'); // Apna Pixel ID yahan dalein
    fbq('track', 'PageView');
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .header {
            color: #d93025; /* Red color from image */
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 25px;
            border: 4px solid #25D366; /* WhatsApp Green border */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .content {
            color: #333;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: left;
            display: inline-block;
        }
        .content span {
            font-weight: bold;
        }
        .btn {
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 18px 30px;
            border-radius: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
            border: none;
            width: 100%;
            box-sizing: border-box;
        }
        .btn img {
            width: 28px;
            height: 28px;
            margin-right: 12px;
        }
        .btn:hover {
            background-color: #128C7E;
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(1px);
        }
        .extra-info {
            color: #666;
            font-size: 14px;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">WORK FROM HOME 🏠</div>
        
        <img src="https://raw.githubusercontent.com/kunaladsagancy-lgtm/newwritingwlp/main/logo.png" alt="Channel Logo" class="logo">
        
        <div class="content">
            <p><span>STUDENTS</span> 📚 पढ़ाई के साथ EXTRA INCOME</p>
            <p><span>HOUSEWIFE</span> 🏠 खाली समय का सही इस्तेमाल</p>
            <p><span>JOB SEEKERS</span> 💼 के नए SOURCE</p>
            <p><span>आसानी से समझ आने वाली GUIDANCE</span></p>
        </div>
        
        <a href="https://whatsapp.com/channel/0029Vb7QG8E3bbVAj5gyi63n" class="btn" onclick="trackWhatsAppJoin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp Icon">
            JOIN WHATSAPP CHANNEL
        </a>

        <div class="extra-info">
            Hurry! 9m 59s left
        </div>
    </div>

    <script>
        function trackWhatsAppJoin() {
            // Button click par Meta Pixel event trigger karna
            fbq('track', 'Lead'); 
        }
    </script>

</body>
</html>
