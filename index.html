    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: flex-start;
        }

        .main-title {
            color: #d93025; /* Red color from image */
            font-size: 28px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .company-logo {
            width: 200px; /* Adjust size to match the image */
            margin-bottom: 30px;
        }

        .text-line {
            font-size: 18px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;

        }

            font-weight: bold;
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            margin: 30px 0;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.1s ease;
        }

        .whatsapp-cta-button:active {
            transform: scale(0.97);
        }

            content: "👉"; /* Finger emoji from image */

    </div>
